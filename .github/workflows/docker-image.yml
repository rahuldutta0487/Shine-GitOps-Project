name: Shine GitOps CI Pipeline

on:
  push:
    branches:
      - main
      - master
      - "feature/**"
  pull_request:
    branches:
      - main
      - master

jobs:
  build-test-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Code Validation
        run: npm run lint --if-present

      - name: Run Unit Tests
        run: npm test --if-present

      - name: Build Docker Image
        run: |
          docker build -t rahuldutta0487/shine-retail-app:${{ github.sha }} .
          docker tag rahuldutta0487/shine-retail-app:${{ github.sha }} rahuldutta0487/shine-retail-app:latest

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rahuldutta0487/shine-retail-app:${{ github.sha }}
          format: table
          exit-code: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: |
          docker push rahuldutta0487/shine-retail-app:${{ github.sha }}
          docker push rahuldutta0487/shine-retail-app:latest
